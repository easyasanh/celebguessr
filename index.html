<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CelebGuessr</title>
    <meta
      name="description"
      content="A golf-style celebrity guessing game where every extra reveal costs a stroke."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand-button" data-action="go-home">
          <span class="brand-mark">CG</span>
          <span>
            <strong>CelebGuessr</strong>
            <small>Every reveal costs a stroke</small>
          </span>
        </button>
        <nav class="topbar__actions">
          <button class="ghost-button" data-action="open-help">How to Play</button>
          <button class="ghost-button" data-action="open-stats">Stats</button>
        </nav>
      </header>

      <main id="view-root" class="view-root" aria-live="polite"></main>
    </div>

    <dialog id="modal" class="modal">
      <div id="modal-content"></div>
    </dialog>

    <template id="home-template">
      <section class="hero-card">
        <div class="hero-card__copy">
          <p class="eyebrow">Daily golf-style celebrity puzzle</p>
          <h1>Guess the celebrity in as few reveals as possible.</h1>
          <p class="lede">
            Play a full nine-hole course, squeeze in a quick three, or keep going in unlimited
            mode. Lower score wins.
          </p>
          <div class="hero-card__actions">
            <button class="primary-button" data-action="start-daily">Play Daily 9</button>
            <button class="secondary-button" data-action="start-quick">Quick 3</button>
            <button class="secondary-button" data-action="setup-unlimited">Unlimited</button>
          </div>
        </div>
        <aside class="score-panel">
          <div>
            <span class="score-panel__label">Today’s course</span>
            <strong id="daily-course-label">#000</strong>
          </div>
          <div>
            <span class="score-panel__label">Current streak</span>
            <strong id="home-streak">0</strong>
          </div>
          <div>
            <span class="score-panel__label">Best Daily 9</span>
            <strong id="home-best">—</strong>
          </div>
          <div>
            <span class="score-panel__label">Average</span>
            <strong id="home-average">—</strong>
          </div>
        </aside>
      </section>

      <section class="panel-grid">
        <article class="panel">
          <p class="panel__kicker">Today’s line</p>
          <h2>One course, nine celebrities, one scorecard.</h2>
          <p id="today-teaser" class="panel__text"></p>
        </article>
        <article class="panel panel--olive">
          <p class="panel__kicker">The format</p>
          <ul class="mini-list">
            <li>Reveal 1 starts every hole.</li>
            <li>Every extra reveal adds 1 stroke.</li>
            <li>Miss the hole and take an 8.</li>
            <li>Finish the card with the lowest total possible.</li>
          </ul>
        </article>
      </section>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
